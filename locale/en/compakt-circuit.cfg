khaoscircuitry-compaktcircuit-rm-processing-units=Removes the [item=processing-unit] processing units ingredient from Compact Circuits, replacing it with more [item=advanced-circuit] advanced circuits or [item=electronic-circuit] electronic circuits instead (depending on the previous setting).
